  <rect x="14" y="16" width="36" height="46" rx="4" fill="#1e40af" stroke="#60a5fa" stroke-width="1.5"/>
  <rect x="20" y="10" width="36" height="46" rx="4" fill="#2563eb" stroke="#93c5fd" stroke-width="1.5"/>
