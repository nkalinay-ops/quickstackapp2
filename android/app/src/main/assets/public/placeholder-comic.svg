<svg width="400" height="600" viewBox="0 0 400 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="600" fill="#1a1a1a"/>

  <!-- Border -->
  <rect x="10" y="10" width="380" height="580" stroke="#404040" stroke-width="2" fill="none"/>

  <!-- Comic Book Icon -->
  <g transform="translate(150, 200)">
    <!-- Book shape -->
    <rect x="0" y="0" width="100" height="140" fill="#2d2d2d" stroke="#505050" stroke-width="2" rx="4"/>
    <rect x="5" y="5" width="90" height="130" fill="#1f1f1f" stroke="#404040" stroke-width="1"/>

    <!-- Pages effect -->
    <line x1="50" y1="5" x2="50" y2="135" stroke="#404040" stroke-width="1"/>
    <line x1="15" y1="20" x2="85" y2="20" stroke="#505050" stroke-width="0.5"/>
    <line x1="15" y1="35" x2="85" y2="35" stroke="#505050" stroke-width="0.5"/>
    <line x1="15" y1="50" x2="85" y2="50" stroke="#505050" stroke-width="0.5"/>

    <!-- Star burst -->
    <circle cx="50" cy="80" r="25" fill="#3b3b3b"/>
    <path d="M50 55 L55 75 L75 75 L59 87 L65 105 L50 95 L35 105 L41 87 L25 75 L45 75 Z" fill="#505050"/>
  </g>

  <!-- Text -->
  <text x="200" y="390" font-family="Arial, sans-serif" font-size="20" fill="#666666" text-anchor="middle" font-weight="bold">
    NO IMAGE
  </text>
  <text x="200" y="420" font-family="Arial, sans-serif" font-size="14" fill="#555555" text-anchor="middle">
    Scan to add cover photo
  </text>
</svg>
